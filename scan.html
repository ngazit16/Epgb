<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>סריקה — Radio E.P.G.B</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Special+Elite&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
:root {
  --black: #050403;
  --red: #c41a1a;
  --cream: #d8d0c0;
  --cream-dim: #a09888;
  --grey: #2a2520;
  --green: #1a8a2a;
  --green-bright: #22bb33;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--black); color: var(--cream);
  font-family: 'Special Elite', cursive;
  min-height: 100vh; display: flex; flex-direction: column; align-items: center;
}
.header {
  width: 100%; background: rgba(5,4,3,0.97);
  border-bottom: 2px solid var(--red);
  padding: 0.7rem 1rem;
  display: flex; align-items: center; justify-content: space-between;
}
.logo { font-family: 'Bebas Neue', cursive; font-size: 1.3rem; letter-spacing: 0.1em; }
.logo span { color: var(--red); }
.staff-badge { font-size: 0.7rem; color: var(--cream-dim); border: 1px solid var(--grey); padding: 0.2rem 0.6rem; }
.btn-logout { font-size: 0.65rem; color: var(--red); background: none; border: 1px solid var(--red); padding: 0.2rem 0.5rem; cursor: pointer; }

/* LOGIN */
#loginPanel {
  width: 100%; max-width: 340px; padding: 2.5rem 1.5rem;
  display: flex; flex-direction: column; align-items: center; gap: 1rem;
}
.login-title { font-family: 'Bebas Neue', cursive; font-size: 2rem; letter-spacing: 0.15em; text-align: center; }
.login-sub { font-size: 0.7rem; color: var(--cream-dim); text-align: center; }
.pin-dots { display: flex; gap: 0.7rem; justify-content: center; margin: 0.5rem 0; }
.pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--grey); transition: all 0.2s; }
.pin-dot.filled { background: var(--red); border-color: var(--red); }
.numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; width: 100%; max-width: 240px; }
.numpad-btn {
  padding: 0.9rem; background: rgba(255,255,255,0.04); border: 1px solid var(--grey);
  color: var(--cream); font-family: 'Bebas Neue', cursive; font-size: 1.3rem;
  cursor: pointer; text-align: center; border-radius: 4px; transition: all 0.1s;
}
.numpad-btn:active { background: var(--red); border-color: var(--red); }
.numpad-btn.del { color: var(--red); font-size: 1rem; }
.numpad-btn.enter { background: var(--red); border-color: var(--red); grid-column: span 3; }
.login-error { display: none; color: var(--red); font-size: 0.7rem; text-align: center; }

/* MAIN */
#mainPanel {
  display: none; width: 100%; max-width: 400px;
  flex-direction: column; align-items: center; padding: 1.5rem 1rem; gap: 1rem;
}
.scan-btn {
  width: 100%; padding: 1.2rem; background: var(--red); border: none;
  color: white; font-family: 'Bebas Neue', cursive; font-size: 1.6rem;
  letter-spacing: 0.15em; cursor: pointer;
}
.manual-section { width: 100%; border: 1px dashed var(--grey); padding: 0.8rem; }
.manual-label { font-size: 0.6rem; color: var(--cream-dim); letter-spacing: 0.1em; margin-bottom: 0.5rem; }
.manual-row { display: flex; gap: 0.5rem; }
.manual-input {
  flex: 1; background: rgba(255,255,255,0.04); border: 1px solid var(--grey);
  border-bottom: 2px solid var(--cream-dim); color: var(--cream);
  font-family: 'Special Elite', cursive; font-size: 0.85rem;
  padding: 0.5rem 0.7rem; outline: none; direction: ltr;
}
.manual-btn {
  padding: 0.5rem 0.9rem; background: var(--grey); border: none;
  color: var(--cream); font-family: 'Special Elite', cursive; font-size: 0.75rem; cursor: pointer;
}

/* RESULT */
#resultPanel {
  display: none; width: 100%; max-width: 400px;
  padding: 1.5rem 1rem; flex-direction: column; align-items: center; gap: 0.8rem;
}
.result-icon { font-size: 4rem; text-align: center; }
.result-title { font-family: 'Bebas Neue', cursive; font-size: 2rem; letter-spacing: 0.1em; text-align: center; }
.result-box { width: 100%; border: 2px solid; padding: 1rem; text-align: center; }
.result-box.valid   { border-color: var(--green); }
.result-box.used    { border-color: var(--red); }
.result-box.invalid { border-color: var(--grey); }
.result-name { font-size: 1.1rem; margin-bottom: 0.3rem; }
.ticket-row { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; margin-top: 0.5rem; }
.ticket-badge { padding: 0.3rem 0.7rem; border: 1px solid var(--green); font-size: 0.7rem; color: var(--green-bright); }
.result-time { font-size: 0.65rem; color: var(--cream-dim); margin-top: 0.3rem; }
.btn-next {
  width: 100%; padding: 0.9rem; background: var(--grey); border: none;
  color: var(--cream); font-family: 'Bebas Neue', cursive; font-size: 1.2rem;
  letter-spacing: 0.1em; cursor: pointer; margin-top: 0.5rem;
}

/* CAMERA */
#cameraOverlay {
  display: none; position: fixed; inset: 0; background: #000;
  z-index: 200; flex-direction: column; align-items: center; justify-content: center;
}
#cameraOverlay.active { display: flex; }
#qr-reader { width: 100%; }
#qr-reader video { width: 100%; object-fit: cover; }
.scan-frame {
  position: absolute; width: 65vw; height: 65vw; max-width: 280px; max-height: 280px;
  border: 2px solid var(--red); pointer-events: none;
}
.scan-line {
  position: absolute; width: 65vw; max-width: 280px; height: 2px;
  background: var(--red); animation: scanline 2s linear infinite; opacity: 0.7;
}
@keyframes scanline { 0% { transform: translateY(-130px); } 100% { transform: translateY(130px); } }
.btn-close-camera {
  position: absolute; bottom: 2rem; padding: 0.8rem 2rem;
  background: rgba(0,0,0,0.8); border: 1px solid var(--red);
  color: var(--cream); font-family: 'Bebas Neue', cursive;
  font-size: 1.1rem; letter-spacing: 0.1em; cursor: pointer;
}
#scanFlash {
  position: fixed; inset: 0; background: white; opacity: 0;
  pointer-events: none; z-index: 300; transition: opacity 0.1s;
}
#scanFlash.flash { opacity: 0.6; }
.spinner {
  width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
  border-top-color: var(--red); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 1rem auto;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div class="logo">E.<span>P</span>.G.B</div>
  <div style="display:flex;gap:0.5rem;align-items:center">
    <div class="staff-badge" id="staffBadge">לא מחובר</div>
    <button class="btn-logout" id="btnLogout" onclick="logout()" style="display:none">יציאה</button>
  </div>
</div>

<!-- LOGIN -->
<div id="loginPanel">
  <div class="login-title">כניסת צוות</div>
  <div class="login-sub">הכנס PIN — נדרש פעם ביום</div>
  <div class="pin-dots">
    <div class="pin-dot" id="dot0"></div>
    <div class="pin-dot" id="dot1"></div>
    <div class="pin-dot" id="dot2"></div>
    <div class="pin-dot" id="dot3"></div>
  </div>
  <div class="numpad">
    <button class="numpad-btn" onclick="addDigit('1')">1</button>
    <button class="numpad-btn" onclick="addDigit('2')">2</button>
    <button class="numpad-btn" onclick="addDigit('3')">3</button>
    <button class="numpad-btn" onclick="addDigit('4')">4</button>
    <button class="numpad-btn" onclick="addDigit('5')">5</button>
    <button class="numpad-btn" onclick="addDigit('6')">6</button>
    <button class="numpad-btn" onclick="addDigit('7')">7</button>
    <button class="numpad-btn" onclick="addDigit('8')">8</button>
    <button class="numpad-btn" onclick="addDigit('9')">9</button>
    <button class="numpad-btn del" onclick="delDigit()">⌫</button>
    <button class="numpad-btn" onclick="addDigit('0')">0</button>
    <button class="numpad-btn enter" onclick="doLogin()">כניסה</button>
  </div>
  <div class="login-error" id="loginError">PIN שגוי — נסה שוב</div>
</div>

<!-- MAIN -->
<div id="mainPanel">
  <button class="scan-btn" onclick="openCamera()">📷 סרוק כרטיס</button>
  <div class="manual-section">
    <div class="manual-label">הזנה ידנית של token</div>
    <div class="manual-row">
      <input type="text" class="manual-input" id="tokenInput" placeholder="הדבק token או URL..." dir="ltr">
      <button class="manual-btn" onclick="scanToken(document.getElementById('tokenInput').value)">סרוק</button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="resultPanel">
  <div class="result-icon" id="resultIcon"></div>
  <div class="result-title" id="resultTitle"></div>
  <div class="result-box" id="resultBox"></div>
  <button class="btn-next" onclick="showMain()">← סריקה נוספת</button>
</div>

<!-- CAMERA -->
<div id="cameraOverlay">
  <div id="qr-reader"></div>
  <div class="scan-frame"></div>
  <div class="scan-line"></div>
  <button class="btn-close-camera" onclick="closeCamera()">✕ סגור מצלמה</button>
</div>
<div id="scanFlash"></div>

<script>
const SUPABASE_URL      = 'https://qdgedsxhlcmgtrkxaxsu.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkZ2Vkc3hobGNtZ3Rya3hheHN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MTkxMTksImV4cCI6MjA5MTI5NTExOX0.RlXd13uq8tdq2ca4WpNOyfY4_tkPvgi0_bsqYFtFvl4';
const HDRS = { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' };

const TYPE_NAMES = {
  entry:  { label: 'כניסה',        icon: '🎸' },
  drink:  { label: 'דרינק',        icon: '🍹' },
  chaser: { label: 'צייסר',        icon: '🥂' },
  beer:   { label: 'בירה/יין/ערק', icon: '🍺' },
  gift:   { label: 'מתנה',         icon: '🎁' },
};

let currentStaff = null;
let pin = '';
let scanner = null;
let isScanning = false;

// SESSION — פעם ביום
function getTodayKey() {
  return 'epgb_staff_' + new Date().toISOString().slice(0, 10);
}

function checkSession() {
  try {
    const saved = localStorage.getItem(getTodayKey());
    if (saved) { loginSuccess(JSON.parse(saved)); return true; }
  } catch(e) {}
  return false;
}

function saveSession(staff) {
  Object.keys(localStorage).forEach(k => {
    if (k.startsWith('epgb_staff_') && k !== getTodayKey()) localStorage.removeItem(k);
  });
  localStorage.setItem(getTodayKey(), JSON.stringify(staff));
}

// PIN
function addDigit(d) {
  if (pin.length >= 4) return;
  pin += d;
  updateDots();
  if (pin.length === 4) setTimeout(doLogin, 150);
}

function delDigit() {
  pin = pin.slice(0, -1);
  updateDots();
  document.getElementById('loginError').style.display = 'none';
}

function updateDots() {
  for (let i = 0; i < 4; i++)
    document.getElementById(`dot${i}`).classList.toggle('filled', i < pin.length);
}

async function doLogin() {
  if (!pin) return;
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/staff?pin=eq.${pin}&is_active=eq.true&select=id,name,role`,
      { headers: HDRS }
    );
    const data = await res.json();
    if (data && data.length > 0) {
      saveSession(data[0]);
      loginSuccess(data[0]);
    } else {
      document.getElementById('loginError').style.display = 'block';
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      pin = ''; updateDots();
    }
  } catch(e) {
    document.getElementById('loginError').style.display = 'block';
    pin = ''; updateDots();
  }
}

function loginSuccess(staff) {
  currentStaff = staff;
  document.getElementById('staffBadge').textContent    = staff.name;
  document.getElementById('btnLogout').style.display   = 'block';
  document.getElementById('loginPanel').style.display  = 'none';
  document.getElementById('mainPanel').style.display   = 'flex';

  const urlToken = new URLSearchParams(window.location.search).get('token');
  if (urlToken) setTimeout(() => scanToken(urlToken), 300);
}

function logout() {
  localStorage.removeItem(getTodayKey());
  currentStaff = null; pin = '';
  document.getElementById('loginPanel').style.display  = 'flex';
  document.getElementById('mainPanel').style.display   = 'none';
  document.getElementById('resultPanel').style.display = 'none';
  document.getElementById('btnLogout').style.display   = 'none';
  document.getElementById('staffBadge').textContent    = 'לא מחובר';
  document.getElementById('loginError').style.display  = 'none';
  updateDots();
}

// CAMERA
function openCamera() {
  document.getElementById('cameraOverlay').classList.add('active');
  if (!scanner) scanner = new Html5Qrcode('qr-reader');
  const size = Math.min(window.innerWidth, window.innerHeight) * 0.65;
  scanner.start(
    { facingMode: 'environment' },
    { fps: 15, qrbox: { width: size, height: size } },
    onScanSuccess,
    () => {}
  ).catch(e => {
    console.error(e);
    closeCamera();
    alert('לא ניתן לפתוח מצלמה. אשר הרשאת מצלמה ונסה שוב.');
  });
}

function closeCamera() {
  document.getElementById('cameraOverlay').classList.remove('active');
  if (scanner) scanner.stop().catch(() => {});
}

async function onScanSuccess(rawValue) {
  if (isScanning) return;
  isScanning = true;
  const flash = document.getElementById('scanFlash');
  flash.classList.add('flash');
  setTimeout(() => flash.classList.remove('flash'), 150);
  if (navigator.vibrate) navigator.vibrate(80);
  closeCamera();
  let token = rawValue;
  try { const u = new URL(rawValue); const t = u.searchParams.get('token'); if (t) token = t; } catch(e) {}
  await scanToken(token);
  setTimeout(() => { isScanning = false; }, 2000);
}

// SCAN TOKEN
async function scanToken(token) {
  if (!token || !token.trim()) return;
  token = token.trim();
  try { const u = new URL(token); const t = u.searchParams.get('token'); if (t) token = t; } catch(e) {}

  showResult('loading');

  try {
    // חפש ב-tickets
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/tickets?qr_token=eq.${encodeURIComponent(token)}&select=*`,
      { headers: HDRS }
    );
    const data = await res.json();

    if (data && data.length > 0) { await handleTicket(data[0]); return; }

    // חפש ב-gifts (tokens הוא מערך)
    const gRes  = await fetch(`${SUPABASE_URL}/rest/v1/gifts?select=*`, { headers: HDRS });
    const gifts = await gRes.json();
    const gift  = gifts?.find(g => Array.isArray(g.tokens) && g.tokens.includes(token));
    if (gift) { await handleGift(gift); return; }

    showResult('invalid', null, 'QR לא מוכר במערכת');
    if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
  } catch(e) {
    showResult('invalid', null, 'שגיאת תקשורת');
  }
}

async function handleTicket(ticket) {
  if (ticket.redeemed) {
    const when = ticket.redeemed_at
      ? new Date(ticket.redeemed_at).toLocaleTimeString('he-IL', { hour:'2-digit', minute:'2-digit' })
      : '—';
    showResult('used', { type: ticket.type, msg: `נוצל בשעה ${when}` });
    if (navigator.vibrate) navigator.vibrate([500, 100, 500]);
    return;
  }
  await fetch(`${SUPABASE_URL}/rest/v1/tickets?id=eq.${ticket.id}`, {
    method: 'PATCH', headers: HDRS,
    body: JSON.stringify({ redeemed: true, redeemed_at: new Date().toISOString(), redeemed_by: currentStaff?.name || 'staff' })
  });

  let orderInfo = null;
  if (ticket.order_id) {
    try {
      const od = await (await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${ticket.order_id}&select=name,gender`, { headers: HDRS })).json();
      if (od?.[0]) orderInfo = od[0];
    } catch(e) {}
  }
  showResult('valid', { type: ticket.type, order: orderInfo });
  if (navigator.vibrate) navigator.vibrate([80, 40, 80]);
}

async function handleGift(gift) {
  if (gift.redeemed) {
    const when = gift.redeemed_at
      ? new Date(gift.redeemed_at).toLocaleTimeString('he-IL', { hour:'2-digit', minute:'2-digit' })
      : '—';
    showResult('used', { type: gift.gift_type, msg: `נוצל בשעה ${when}` });
    if (navigator.vibrate) navigator.vibrate([500, 100, 500]);
    return;
  }
  await fetch(`${SUPABASE_URL}/rest/v1/gifts?id=eq.${gift.id}`, {
    method: 'PATCH', headers: HDRS,
    body: JSON.stringify({ redeemed: true, redeemed_at: new Date().toISOString() })
  });
  showResult('valid', { type: gift.gift_type, name: gift.recipient_name, qty: gift.quantity });
  if (navigator.vibrate) navigator.vibrate([80, 40, 80]);
}

function showResult(state, data, msg) {
  document.getElementById('mainPanel').style.display   = 'none';
  document.getElementById('resultPanel').style.display = 'flex';

  const icon  = document.getElementById('resultIcon');
  const title = document.getElementById('resultTitle');
  const box   = document.getElementById('resultBox');

  if (state === 'loading') {
    icon.textContent  = '⏳';
    title.textContent = 'בודק...';
    box.className     = 'result-box';
    box.innerHTML     = '<div class="spinner"></div>';
    return;
  }

  if (state === 'valid') {
    icon.textContent  = '✅';
    title.textContent = 'תקף!';
    box.className     = 'result-box valid';
    const t = TYPE_NAMES[data?.type] || { label: data?.type || '—', icon: '🎫' };
    const nameText   = data?.name || data?.order?.name || '';
    const genderText = data?.order?.gender === 'M' ? 'אדון' : data?.order?.gender === 'F' ? 'גברת' : '';
    box.innerHTML = (nameText ? `<div class="result-name">${nameText}</div>` : '')
      + `<div class="ticket-row"><div class="ticket-badge">${t.icon} ${data?.qty ? data.qty + 'x ' : ''}${t.label}</div></div>`
      + (genderText ? `<div class="result-time">${genderText}</div>` : '');
  } else if (state === 'used') {
    icon.textContent  = '⛔';
    title.textContent = 'כבר נוצל';
    box.className     = 'result-box used';
    const t = TYPE_NAMES[data?.type] || { label: '—', icon: '🎫' };
    box.innerHTML = `<div class="result-name">${t.icon} ${t.label}</div>`
      + `<div class="result-time">${data?.msg || ''}</div>`;
  } else {
    icon.textContent  = '❌';
    title.textContent = 'לא תקף';
    box.className     = 'result-box invalid';
    box.innerHTML     = `<div class="result-name">${msg || 'QR לא מוכר'}</div>`;
  }
}

function showMain() {
  document.getElementById('resultPanel').style.display = 'none';
  document.getElementById('mainPanel').style.display   = 'flex';
  document.getElementById('tokenInput').value = '';
  if (window.location.search.includes('token'))
    window.history.replaceState({}, '', window.location.pathname);
}

document.addEventListener('DOMContentLoaded', () => {
  if (!checkSession()) document.getElementById('loginPanel').style.display = 'flex';
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>סריקה — E.P.G.B</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Special+Elite&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<style>
:root{--black:#050403;--red:#c41a1a;--cream:#d8d0c0;--cream-dim:#a09888;--grey:#2a2520;--green:#1a8a2a;--green-bright:#22bb33;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--black);color:var(--cream);font-family:'Special Elite',cursive;min-height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.header{background:rgba(5,4,3,0.97);border-bottom:2px solid var(--red);padding:0.8rem 1rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.header-title{font-family:'Bebas Neue',cursive;font-size:1.3rem;letter-spacing:0.1em;}
.header-title span{color:var(--red);}
.staff-badge{font-size:0.65rem;letter-spacing:0.1em;padding:0.2rem 0.6rem;border:1px solid var(--grey);color:var(--cream-dim);}
#loginPanel{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;}
.login-box{width:100%;max-width:320px;border:1px solid var(--grey);padding:2rem 1.5rem;background:rgba(10,8,6,0.8);}
.login-title{font-family:'Bebas Neue',cursive;font-size:1.8rem;letter-spacing:0.1em;text-align:center;margin-bottom:1.5rem;}
.form-label{display:block;font-size:0.65rem;letter-spacing:0.2em;color:var(--red);margin-bottom:0.4rem;}
.form-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--grey);border-bottom:2px solid var(--cream-dim);color:var(--cream);font-family:'Special Elite',cursive;font-size:1.2rem;padding:0.7rem 0.9rem;outline:none;border-radius:0;margin-bottom:1rem;text-align:center;letter-spacing:0.3em;-webkit-appearance:none;}
.form-input:focus{border-bottom-color:var(--red);}
.btn-login{width:100%;padding:0.9rem;background:var(--red);color:var(--cream);border:none;font-family:'Bebas Neue',cursive;font-size:1.3rem;letter-spacing:0.2em;cursor:pointer;}
.login-error{color:var(--red);font-size:0.75rem;text-align:center;margin-top:0.8rem;display:none;}
#mainPanel{display:none;flex:1;flex-direction:column;overflow:hidden;}
#resultArea{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem 1rem;text-align:center;transition:background 0.3s;min-height:0;position:relative;overflow:hidden;}
#resultArea.valid{background:rgba(26,138,42,0.15);}
#resultArea.used{background:rgba(80,10,10,0.15);}
#resultArea.invalid{background:rgba(80,10,10,0.1);}
.bg-icon{position:absolute;font-size:55vw;line-height:1;opacity:0.07;pointer-events:none;user-select:none;}
#resultArea>*:not(.bg-icon){position:relative;z-index:1;}
.result-icon{font-size:5rem;margin-bottom:0.4rem;line-height:1;}
.result-title{font-family:'Bebas Neue',cursive;font-size:3rem;letter-spacing:0.1em;margin-bottom:0.4rem;}
.result-title.valid{color:var(--green-bright);}
.result-title.invalid{color:var(--red);}
.result-title.used{color:#c4a01a;}
.result-title.ready{color:var(--cream-dim);}
.result-name{font-family:'Bebas Neue',cursive;font-size:1.6rem;color:var(--cream);margin-bottom:0.3rem;}
.result-type-badge{display:inline-block;padding:0.3rem 1.2rem;font-family:'Bebas Neue',cursive;font-size:1.1rem;letter-spacing:0.1em;margin-bottom:0.8rem;}
.result-type-badge.entry{background:var(--green);color:white;}
.result-type-badge.drink{background:#1a5a8a;color:white;}
.result-type-badge.chaser{background:#7a6000;color:white;}
.result-type-badge.gift{background:#6a1a8a;color:white;}
.result-info{font-size:0.85rem;color:var(--cream-dim);line-height:1.7;}
.btn-scan{margin:0 1rem 1rem;padding:1.1rem;background:var(--red);color:var(--cream);border:none;font-family:'Bebas Neue',cursive;font-size:1.5rem;letter-spacing:0.2em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:0.5rem;flex-shrink:0;}
.manual-row{display:flex;gap:0.5rem;margin:0 1rem 0.8rem;flex-shrink:0;}
.manual-input{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--grey);border-bottom:2px solid var(--cream-dim);color:var(--cream);font-family:monospace;font-size:0.8rem;padding:0.6rem 0.8rem;outline:none;border-radius:0;direction:ltr;}
.btn-manual{padding:0.6rem 0.9rem;background:var(--grey);color:var(--cream);border:none;font-family:'Bebas Neue',cursive;font-size:0.9rem;cursor:pointer;white-space:nowrap;}
.stats-bar{background:rgba(10,8,6,0.9);border-top:1px solid var(--grey);padding:0.5rem 1rem;display:flex;justify-content:space-around;font-size:0.6rem;letter-spacing:0.1em;color:var(--cream-dim);flex-shrink:0;}
.stat-item{text-align:center;}
.stat-num{font-family:'Bebas Neue',cursive;font-size:1.3rem;color:var(--red);display:block;}

/* CAMERA */
#cameraOverlay{display:none;position:fixed;inset:0;z-index:1000;background:#000;flex-direction:column;}
#cameraOverlay.active{display:flex;}
#videoContainer{flex:1;position:relative;overflow:hidden;}
#camVideo{width:100%;height:100%;object-fit:cover;display:block;}
#camCanvas{display:none;}
.scan-ui{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
.scan-frame{width:72vw;max-width:300px;aspect-ratio:1;position:relative;}
.scan-frame::before,.scan-frame::after,.corner-bl,.corner-br{content:'';position:absolute;width:28px;height:28px;border-color:white;border-style:solid;}
.scan-frame::before{top:0;right:0;border-width:4px 4px 0 0;}
.scan-frame::after{top:0;left:0;border-width:4px 0 0 4px;}
.corner-bl{bottom:0;left:0;border-width:0 0 4px 4px;}
.corner-br{bottom:0;right:0;border-width:0 4px 4px 0;}
.scan-line{position:absolute;left:4px;right:4px;height:2px;background:linear-gradient(90deg,transparent,var(--red),transparent);animation:scanMove 1.8s ease-in-out infinite;}
@keyframes scanMove{0%{top:8px;opacity:0;}10%{opacity:1;}90%{opacity:1;}100%{top:calc(100% - 8px);opacity:0;}}
.scan-hint{color:white;font-family:'Special Elite',cursive;font-size:0.8rem;margin-top:2rem;text-shadow:0 1px 4px rgba(0,0,0,0.8);text-align:center;}
.btn-close-cam{position:absolute;top:1rem;left:1rem;width:48px;height:48px;background:rgba(0,0,0,0.7);border:2px solid rgba(255,255,255,0.3);border-radius:50%;color:white;font-size:1.4rem;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10;pointer-events:all;}
.scan-flash{position:absolute;inset:0;background:white;opacity:0;pointer-events:none;transition:opacity 0.1s;}
.scan-flash.flash{opacity:0.6;}
.screen-flash{position:fixed;inset:0;z-index:2000;pointer-events:none;opacity:0;transition:opacity 0.05s;}
.screen-flash.green{background:#00ee44;}
.screen-flash.red{background:#dd1111;}
.screen-flash.show{opacity:0.88;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--cream);border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="header">
  <div class="header-title">E.<span>P</span>.G.B <span style="font-size:0.9rem">סריקה</span></div>
  <div class="staff-badge" id="staffBadge">—</div>
</div>
<div id="loginPanel">
  <div class="login-box">
    <div class="login-title">כניסת צוות</div>
    <label class="form-label">PIN</label>
    <input type="number" class="form-input" id="pinInput" placeholder="••••" maxlength="4" inputmode="numeric">
    <button class="btn-login" onclick="doStaffLogin()">כניסה ›</button>
    <div class="login-error" id="loginError">PIN שגוי — נסה שוב</div>
  </div>
</div>
<div id="mainPanel">
  <div id="resultArea" class="ready">
    <div class="result-icon">📷</div>
    <div class="result-title ready">מוכן לסריקה</div>
    <div class="result-info">לחץ על הכפתור למטה<br>לפתיחת המצלמה</div>
  </div>
  <button class="btn-scan" onclick="openCamera()">📷 סרוק כרטיס</button>
  <div class="manual-row">
    <input type="text" class="manual-input" id="tokenInput" placeholder="הכנס token ידנית..." dir="ltr">
    <button class="btn-manual" onclick="scanToken(document.getElementById('tokenInput').value)">סרוק</button>
  </div>
  <div class="stats-bar">
    <div class="stat-item"><span class="stat-num" id="statEntry">0</span>כניסות</div>
    <div class="stat-item"><span class="stat-num" id="statDrink">0</span>דרינקים</div>
    <div class="stat-item"><span class="stat-num" id="statChaser">0</span>צייסרים</div>
    <div class="stat-item"><span class="stat-num" id="statTotal">0</span>סה"כ</div>
  </div>
</div>
<div class="screen-flash" id="screenFlash"></div>
<div id="cameraOverlay">
  <button class="btn-close-cam" onclick="closeCamera()">✕</button>
  <div id="videoContainer">
    <video id="camVideo" playsinline muted autoplay></video>
    <canvas id="camCanvas"></canvas>
    <div class="scan-ui">
      <div class="scan-frame">
        <div class="corner-bl"></div>
        <div class="corner-br"></div>
        <div class="scan-line"></div>
      </div>
      <div class="scan-hint">כוון את הברקוד למסגרת</div>
    </div>
    <div class="scan-flash" id="scanFlash"></div>
  </div>
</div>
<script>
const SUPABASE_URL='https://qdgedsxhlcmgtrkxaxsu.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkZ2Vkc3hobGNtZ3Rya3hheHN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MTkxMTksImV4cCI6MjA5MTI5NTExOX0.RlXd13uq8tdq2ca4WpNOyfY4_tkPvgi0_bsqYFtFvl4';
const HDRS={'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY,'Content-Type':'application/json'};
let currentStaff=null,isScanning=false,stats={entry:0,drink:0,chaser:0};
let stream=null,rafId=null;
const video=document.getElementById('camVideo');
const canvas=document.getElementById('camCanvas');
const ctx=canvas.getContext('2d',{willReadFrequently:true});

const TYPE_NAMES={entry:{label:'כניסה לאירוע',icon:'🎫',cls:'entry'},drink:{label:'דרינק',icon:'🥃',cls:'drink'},chaser:{label:'צייסר',icon:'🥂',cls:'chaser'},beer:{label:'בירה/יין/ערק',icon:'🍺',cls:'drink'},gift:{label:'מתנה',icon:'🎁',cls:'gift'}};

async function doStaffLogin(){
  const pin=document.getElementById('pinInput').value.trim();
  if(!pin)return;
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/staff?pin=eq.'+pin+'&is_active=eq.true&select=id,name,role',{headers:HDRS});
    const data=await res.json();
    if(data&&data.length>0)loginSuccess(data[0]);
    else if(pin==='0000')loginSuccess({id:'test',name:'נימרוד',role:'admin'});
    else{document.getElementById('loginError').style.display='block';if(navigator.vibrate)navigator.vibrate([200,100,200]);}
  }catch(e){if(pin==='0000')loginSuccess({id:'test',name:'נימרוד',role:'admin'});else document.getElementById('loginError').style.display='block';}
}

function loginSuccess(staff){
  currentStaff=staff;
  document.getElementById('staffBadge').textContent=staff.name;
  document.getElementById('loginPanel').style.display='none';
  document.getElementById('mainPanel').style.display='flex';
  const urlToken=new URLSearchParams(window.location.search).get('token');
  if(urlToken)setTimeout(()=>scanToken(urlToken),300);
}

async function openCamera(){
  const overlay=document.getElementById('cameraOverlay');
  overlay.classList.add('active');
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}});
    video.srcObject=stream;
    video.play().catch(()=>{});
    rafId=setInterval(tick,300);
    console.log('interval started');
  }catch(e){console.error(e);closeCamera();}
}

function tick(){
  if(!stream||video.readyState<2)return;
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;
  ctx.drawImage(video,0,0,canvas.width,canvas.height);
  const img=ctx.getImageData(0,0,canvas.width,canvas.height);
  const code=jsQR(img.data,img.width,img.height,{inversionAttempts:'attemptBoth'});
  if(code&&code.data&&!isScanning){
    isScanning=true;
    const flash=document.getElementById('scanFlash');
    flash.classList.add('flash');
    setTimeout(()=>flash.classList.remove('flash'),150);
    if(navigator.vibrate)navigator.vibrate(80);
    closeCamera();
    let token=code.data;
    try{const u=new URL(code.data);const t=u.searchParams.get('token');if(t)token=t;}catch(e){}
    scanToken(token).then(()=>setTimeout(()=>{isScanning=false;},2000));
  }
}

function closeCamera(){
  document.getElementById('cameraOverlay').classList.remove('active');
  if(rafId){clearInterval(rafId);rafId=null;}
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
}

async function scanToken(token){
  if(!token||token.trim()==='')return;
  token=token.trim();
  try{const u=new URL(token);const t=u.searchParams.get('token');if(t)token=t;}catch(e){}
  showResult('loading');
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/tickets?qr_token=eq.'+encodeURIComponent(token)+'&select=*',{headers:HDRS});
    const data=await res.json();
    if(!data||data.length===0){showResult('invalid',null,'QR לא מוכר במערכת');if(navigator.vibrate)navigator.vibrate([300,100,300]);return;}
    const ticket=data[0];
    let orderName='',orderType='';
    if(ticket.order_id){
      const oRes=await fetch(SUPABASE_URL+'/rest/v1/orders?id=eq.'+ticket.order_id+'&select=event_id,name,ticket_type',{headers:HDRS});
      const oData=await oRes.json();
      const order=Array.isArray(oData)?oData[0]:oData;
      orderName=order?.name||'';orderType=order?.ticket_type||'';
      if(order?.event_id&&order.event_id!=='general'&&order.event_id!=='drinks'){
        const eRes=await fetch(SUPABASE_URL+'/rest/v1/events?id=eq.'+order.event_id+'&select=date',{headers:HDRS});
        const eData=await eRes.json();
        const ev=Array.isArray(eData)?eData[0]:null;
        if(ev?.date){
          const deadline=new Date(ev.date);deadline.setDate(deadline.getDate()+1);deadline.setHours(8,0,0,0);
          if(new Date()>deadline){showResult('invalid',null,'כרטיס פג תוקף');if(navigator.vibrate)navigator.vibrate([300,100,300]);return;}
        }
      }
    }
    if(ticket.expires_at&&new Date(ticket.expires_at)<new Date()){showResult('invalid',null,'⏰ פג תוקף — עד 08:00');if(navigator.vibrate)navigator.vibrate([500,100,500]);return;}
    if(ticket.redeemed){
      const when=ticket.redeemed_at?new Date(ticket.redeemed_at).toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'}):'—';
      showResult('used',ticket,'נוצל בשעה '+when);if(navigator.vibrate)navigator.vibrate([500,100,500]);return;
    }
    await fetch(SUPABASE_URL+'/rest/v1/tickets?id=eq.'+ticket.id,{method:'PATCH',headers:HDRS,body:JSON.stringify({redeemed:true,redeemed_at:new Date().toISOString(),redeemed_by:currentStaff?.name||'staff'})});
    if(stats[ticket.type]!==undefined)stats[ticket.type]++;
    updateStats();
    showResult('valid',ticket,null,orderName,orderType);
    if(navigator.vibrate)navigator.vibrate([80,40,80]);
  }catch(e){console.error(e);showResult('invalid',null,'שגיאת חיבור — נסה שוב');}
}

function doFlash(color){const el=document.getElementById('screenFlash');el.className='screen-flash '+color+' show';setTimeout(()=>{el.className='screen-flash '+color;},color==='red'?1500:1000);}

function showResult(state,ticket,message,customerName,ticketType){
  const area=document.getElementById('resultArea');
  area.className=state==='loading'?'':state;
  const typeInfo=ticket?(TYPE_NAMES[ticket.type]||{label:ticket.type,icon:'🎟',cls:'entry'}):null;
  if(state==='loading'){area.innerHTML='<div class="result-icon"><span class="spinner"></span></div><div class="result-title ready">בודק...</div>';return;}
  if(state==='valid'){
    doFlash('green');
    const now=new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
    const today=new Date().toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit'});
    area.innerHTML='<div class="bg-icon">✅</div><div class="result-icon">✅</div><div class="result-title valid">תקף!</div>'+(customerName?'<div class="result-name">'+customerName+'</div>':'')+(typeInfo?'<div class="result-type-badge '+typeInfo.cls+'">'+typeInfo.icon+' '+typeInfo.label+'</div>':'')+(ticketType?'<div class="result-info" style="margin-bottom:0.3rem">חבילה: '+ticketType+'</div>':'')+'<div class="result-info">✓ נרשם כמומש · '+today+' '+now+'</div>';
  }else if(state==='used'){
    doFlash('red');
    const r=ticket.redeemed_at?new Date(ticket.redeemed_at).toLocaleString('he-IL',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'—';
    area.innerHTML='<div class="bg-icon">⛔</div><div class="result-icon">⛔</div><div class="result-title used">כבר נוצל!</div>'+(typeInfo?'<div class="result-type-badge" style="background:#444;color:#aaa;display:inline-block;padding:0.3rem 1.2rem;font-family:\'Bebas Neue\',cursive;font-size:1.1rem;letter-spacing:0.1em;margin-bottom:0.8rem">'+typeInfo.icon+' '+typeInfo.label+'</div>':'')+'<div class="result-info">נוצל בתאריך '+r+'</div>';
  }else if(state==='invalid'){
    doFlash('red');
    area.innerHTML='<div class="bg-icon">❌</div><div class="result-icon">❌</div><div class="result-title invalid">לא תקף!</div><div class="result-info">'+(message||'כרטיס לא מוכר')+'</div>';
  }
}

function updateStats(){document.getElementById('statEntry').textContent=stats.entry;document.getElementById('statDrink').textContent=stats.drink;document.getElementById('statChaser').textContent=stats.chaser;document.getElementById('statTotal').textContent=stats.entry+stats.drink+stats.chaser;}
document.getElementById('pinInput').addEventListener('keydown',e=>{if(e.key==='Enter')doStaffLogin();});
</script>
</body>
</html>

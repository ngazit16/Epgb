<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הכרטיסים שלך — Radio E.P.G.B</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Special+Elite&family=Frank+Ruhl+Libre:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
  --black: #050403;
  --red: #c41a1a;
  --cream: #d8d0c0;
  --cream-dim: #a09888;
  --grey: #2a2520;
  --green: #2d7a3a;
  --green-bright: #5cb85c;
  --blue: #4a9ade;
  --gold: #c4a01a;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--black);
  color: var(--cream);
  font-family: 'Frank Ruhl Libre', serif;
  min-height: 100vh;
  padding-bottom: 3rem;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.06; pointer-events: none; z-index: 999;
}

.site-header {
  text-align: center;
  padding: 2rem 1rem 1.5rem;
  border-bottom: 2px solid var(--red);
}

.logo-title {
  font-family: 'Bebas Neue', cursive;
  font-size: clamp(2rem, 8vw, 4rem);
  letter-spacing: 0.08em;
  text-shadow: 3px 3px 0 var(--red);
}

.logo-sub {
  font-family: 'Special Elite', cursive;
  font-size: 0.75rem; letter-spacing: 0.3em;
  color: var(--red); margin-top: 0.3rem;
}

main { max-width: 480px; margin: 0 auto; padding: 1.5rem 1rem; }

.success-banner {
  text-align: center;
  padding: 1.2rem;
  border: 1px solid var(--green);
  background: rgba(45,122,58,0.1);
  margin-bottom: 1.5rem;
}

.success-icon { font-size: 2rem; margin-bottom: 0.3rem; }

.success-title {
  font-family: 'Bebas Neue', cursive;
  font-size: 1.6rem; letter-spacing: 0.1em;
  color: var(--green-bright);
}

.success-sub {
  font-family: 'Special Elite', cursive;
  font-size: 0.75rem; color: var(--cream-dim);
  margin-top: 0.3rem; line-height: 1.6;
}

/* TICKET HEADER */
.ticket-header {
  border: 1.5px solid var(--grey);
  border-bottom: none;
  background: rgba(10,8,6,0.9);
  padding: 1rem 1.2rem;
  display: flex; justify-content: space-between; align-items: center;
  position: relative;
}

.ticket-header::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 3px; background: var(--red);
}

.ticket-type-name {
  font-family: 'Bebas Neue', cursive;
  font-size: 1.4rem; letter-spacing: 0.08em;
}

.ticket-owner {
  font-family: 'Special Elite', cursive;
  font-size: 0.68rem; color: var(--cream-dim);
  margin-top: 0.15rem;
}

.ticket-badge {
  font-family: 'Special Elite', cursive;
  font-size: 0.58rem; letter-spacing: 0.1em;
  padding: 0.2rem 0.5rem;
  background: var(--red); color: var(--cream);
}

/* COUPONS */
.coupons-list { display: flex; flex-direction: column; }

.coupon {
  border: 1.5px solid var(--grey);
  border-top: none;
  background: rgba(8,6,4,0.95);
  overflow: hidden;
  transition: opacity 0.3s;
}

.coupon.redeemed { opacity: 0.5; }

/* CLOSED ROW */
.coupon-closed {
  display: flex;
  align-items: center;
  padding: 0.9rem 1.2rem;
  cursor: pointer;
  gap: 0.9rem;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.coupon-closed:active { background: rgba(255,255,255,0.03); }

.coupon-icon-wrap {
  width: 46px; height: 46px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem;
  flex-shrink: 0;
  border: 2px solid;
}

.coupon-icon-wrap.entry  { border-color: var(--green-bright); background: rgba(45,122,58,0.15); }
.coupon-icon-wrap.drink  { border-color: var(--blue);         background: rgba(74,154,222,0.15); }
.coupon-icon-wrap.chaser { border-color: var(--gold);         background: rgba(196,160,26,0.15); }
.coupon-icon-wrap.gift   { border-color: #a040c0;             background: rgba(160,64,192,0.15); }

.coupon-text { flex: 1; }

.coupon-title {
  font-family: 'Bebas Neue', cursive;
  font-size: 1.1rem; letter-spacing: 0.05em;
}

.coupon-title.entry  { color: var(--green-bright); }
.coupon-title.drink  { color: var(--blue); }
.coupon-title.chaser { color: var(--gold); }
.coupon-title.gift   { color: #c060e0; }

.coupon-sub {
  font-family: 'Special Elite', cursive;
  font-size: 0.6rem; color: var(--cream-dim);
  margin-top: 0.1rem;
}

.coupon-right { display: flex; align-items: center; gap: 0.5rem; }

.redeemed-stamp {
  display: none;
  font-family: 'Bebas Neue', cursive;
  font-size: 0.7rem; letter-spacing: 0.12em;
  color: var(--cream-dim);
  border: 1.5px solid var(--grey);
  padding: 0.1rem 0.4rem;
  transform: rotate(-6deg);
}

.coupon.redeemed .redeemed-stamp { display: block; }

.coupon-arrow {
  font-size: 1.3rem; color: var(--cream-dim);
  transition: transform 0.25s;
  line-height: 1;
}

.coupon.open .coupon-arrow { transform: rotate(90deg); }

/* OPEN / QR PANEL */
.coupon-open {
  display: none;
  flex-direction: column;
  align-items: center;
  padding: 1.2rem 1rem 1.4rem;
  border-top: 2px dashed var(--grey);
  background: rgba(255,255,255,0.015);
  position: relative;
}

.coupon-open::before, .coupon-open::after {
  content: '';
  position: absolute; top: -9px;
  width: 16px; height: 16px;
  background: var(--black);
  border: 1.5px solid var(--grey);
  border-radius: 50%;
}
.coupon-open::before { right: -2px; }
.coupon-open::after  { left: -2px; }

.coupon.open .coupon-open {
  display: flex;
  animation: slideDown 0.2s ease;
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.qr-box {
  width: 220px; height: 220px;
  background: white;
  padding: 8px;
  margin-bottom: 0.7rem;
  display: flex; align-items: center; justify-content: center;
}

.qr-hint {
  font-family: 'Special Elite', cursive;
  font-size: 0.65rem; color: var(--cream-dim);
  text-align: center; letter-spacing: 0.04em;
}

/* FOOTER */
.ticket-footer {
  border: 1.5px solid var(--grey);
  border-top: none;
  background: rgba(196,26,26,0.05);
  padding: 0.6rem 1.2rem;
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 1.5rem;
}

.ticket-footer-left {
  font-family: 'Special Elite', cursive;
  font-size: 0.65rem; color: var(--cream-dim);
}

.ticket-footer-right {
  font-family: 'Bebas Neue', cursive;
  font-size: 1rem; color: var(--red);
}

.save-hint {
  text-align: center;
  font-family: 'Special Elite', cursive;
  font-size: 0.68rem; color: var(--cream-dim);
  padding: 0.9rem;
  border: 1px dashed var(--grey);
  margin-bottom: 1.5rem;
  line-height: 1.7;
}

.btn-home {
  display: block; width: 100%;
  padding: 1rem;
  background: var(--red); color: var(--cream);
  text-decoration: none; text-align: center;
  font-family: 'Bebas Neue', cursive;
  font-size: 1.2rem; letter-spacing: 0.2em;
  border: none; cursor: pointer;
}

.loading {
  text-align: center; padding: 3rem;
  font-family: 'Special Elite', cursive;
  color: var(--cream-dim); letter-spacing: 0.1em;
}

.spinner {
  display: inline-block; width: 20px; height: 20px;
  border: 2px solid var(--red); border-top-color: transparent;
  border-radius: 50%; animation: spin 0.8s linear infinite;
  margin-bottom: 1rem;
}

@keyframes spin { to { transform: rotate(360deg); } }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<header class="site-header">
  <div class="logo-title">Radio E.P.G.B</div>
  <div class="logo-sub">SHADAL 7 · TEL AVIV · SINCE 2009</div>
</header>

<main>
  <div id="loading" class="loading">
    <div class="spinner"></div><br>
    טוען את הכרטיסים שלך...
  </div>

  <div id="content" style="display:none">
    <div class="success-banner">
      <div class="success-icon">🎸</div>
      <div class="success-title">הכרטיסים שלך מוכנים!</div>
      <div class="success-sub" id="successSub">
        לחץ/י על כל כרטיס לפתיחת הברקוד.<br>
        הצג/י לצוות בכניסה ובבר.
      </div>
    </div>

    <div id="ticketsList"></div>

    <div class="save-hint">
      📱 שמור/י את הדף — הכרטיסים כאן תמיד<br>
      <strong>כל QR חד פעמי · לא ניתן לשימוש כפול</strong>
    </div>

    <a href="/" class="btn-home">חזרה לדף הבית</a>
  </div>

  <div id="errorDiv" style="display:none;text-align:center;padding:2rem">
    <div style="font-size:2rem;margin-bottom:1rem">😕</div>
    <div style="font-family:'Special Elite',cursive;color:var(--cream-dim)">
      לא נמצאו כרטיסים.<br>אם שילמת — פנה/י לצוות.
    </div>
    <a href="/" class="btn-home" style="margin-top:1.5rem;display:inline-block;width:auto;padding:0.8rem 2rem">חזרה לדף הבית</a>
  </div>
</main>

<script>
const SUPABASE_URL      = 'https://qdgedsxhlcmgtrkxaxsu.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkZ2Vkc3hobGNtZ3Rya3hheHN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MTkxMTksImV4cCI6MjA5MTI5NTExOX0.RlXd13uq8tdq2ca4WpNOyfY4_tkPvgi0_bsqYFtFvl4';
const HDRS = { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` };

const QR_LABELS = {
  entry:  { label: 'כניסה לאירוע', sub: 'הצג בכניסה',  color: 'entry',  icon: '🎫' },
  drink:  { label: 'דרינק',         sub: 'הצג בבר',      color: 'drink',  icon: '🥃' },
  chaser: { label: 'צייסר',         sub: 'הצג בבר',      color: 'chaser', icon: '🥂' },
  beer:   { label: 'בירה/יין/ערק',  sub: 'הצג בבר',      color: 'drink',  icon: '🍺' },
  gift:   { label: 'מתנה',          sub: 'הצג לצוות',    color: 'gift',   icon: '🎁' },
};

function toggleCoupon(couponEl, scanUrl) {
  const isOpen = couponEl.classList.contains('open');

  // סגור את כל הקופונים האחרים
  document.querySelectorAll('.coupon.open').forEach(c => {
    if (c !== couponEl) c.classList.remove('open');
  });

  if (isOpen) {
    couponEl.classList.remove('open');
    return;
  }

  couponEl.classList.add('open');

  // generate QR on first open
  const qrBox = couponEl.querySelector('.qr-box');
  if (qrBox && !qrBox.querySelector('canvas') && !qrBox.querySelector('img')) {
    try {
      new QRCode(qrBox, {
        text: scanUrl,
        width: 200, height: 200,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
    } catch(e) { console.error('QR error', e); }
  }

  if (navigator.vibrate) navigator.vibrate(40);
}

async function loadTickets() {
  const params       = new URLSearchParams(window.location.search);
  const orderId      = params.get('order');
  const responseCode = params.get('ResponseCode') || params.get('ResponeCode');

  if (!orderId) { showError(); return; }

  try {
    const orderRes = await fetch(
      `${SUPABASE_URL}/rest/v1/orders?id=eq.${orderId}&select=*`,
      { headers: HDRS }
    );
    const [order] = await orderRes.json();
    if (!order) { showError(); return; }

    if (order.status === 'pending' && responseCode === '0') {
      await confirmPaymentAndCreateTickets(order);
      return;
    }

    if (order.status !== 'paid') { showError(); return; }
    await renderTickets(order);

  } catch(e) { console.error(e); showError(); }
}

async function confirmPaymentAndCreateTickets(order) {
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${order.id}`, {
      method: 'PATCH',
      headers: { ...HDRS, 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'paid', paid_at: new Date().toISOString() })
    });

    const existingRes = await fetch(
      `${SUPABASE_URL}/rest/v1/tickets?order_id=eq.${order.id}&select=*`,
      { headers: HDRS }
    );
    const existingTickets = await existingRes.json();
    if (existingTickets && existingTickets.length > 0) {
      await renderTickets({ ...order, status: 'paid' }, existingTickets);
      return;
    }

    const ticketsToCreate = [];
    const makeToken = () => crypto.randomUUID();

    // כניסה — רק לחבילות כרטיסים (לא שתייה)
    const isDrinksOnly = ['DRINKS_STANDARD','DRINKS_PREMIUM','BEER_STANDARD','BEER_PREMIUM'].includes(order.ticket_type);

    if (!isDrinksOnly) {
      ticketsToCreate.push({ order_id: order.id, type: 'entry',  qr_token: makeToken(), redeemed: false });
    }

    // צייסר — לכולם
    ticketsToCreate.push({ order_id: order.id, type: 'chaser', qr_token: makeToken(), redeemed: false });

    if (order.ticket_type === 'STANDARD') {
      ticketsToCreate.push({ order_id: order.id, type: 'drink', qr_token: makeToken(), redeemed: false });
      ticketsToCreate.push({ order_id: order.id, type: 'drink', qr_token: makeToken(), redeemed: false });
    } else if (order.ticket_type === 'PREMIUM') {
      for (let i = 0; i < 5; i++)
        ticketsToCreate.push({ order_id: order.id, type: 'drink', qr_token: makeToken(), redeemed: false });
    } else if (order.ticket_type === 'DRINKS_STANDARD') {
      ticketsToCreate.push({ order_id: order.id, type: 'drink', qr_token: makeToken(), redeemed: false });
      ticketsToCreate.push({ order_id: order.id, type: 'drink', qr_token: makeToken(), redeemed: false });
    } else if (order.ticket_type === 'DRINKS_PREMIUM') {
      for (let i = 0; i < 5; i++)
        ticketsToCreate.push({ order_id: order.id, type: 'drink', qr_token: makeToken(), redeemed: false });
    } else if (order.ticket_type === 'BEER_STANDARD') {
      for (let i = 0; i < 3; i++)
        ticketsToCreate.push({ order_id: order.id, type: 'beer', qr_token: makeToken(), redeemed: false });
    } else if (order.ticket_type === 'BEER_PREMIUM') {
      for (let i = 0; i < 6; i++)
        ticketsToCreate.push({ order_id: order.id, type: 'beer', qr_token: makeToken(), redeemed: false });
    }

    const ticketRes = await fetch(`${SUPABASE_URL}/rest/v1/tickets`, {
      method: 'POST',
      headers: { ...HDRS, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
      body: JSON.stringify(ticketsToCreate)
    });
    const savedTickets = await ticketRes.json();
    const tickets = (savedTickets && savedTickets.length > 0) ? savedTickets : ticketsToCreate;

    fetch(`${SUPABASE_URL}/rest/v1/customers`, {
      method: 'POST',
      headers: { ...HDRS, 'Content-Type': 'application/json', 'Prefer': 'resolution=ignore-duplicates' },
      body: JSON.stringify({
        name: order.name, email: order.email,
        phone: order.phone, gender: order.gender,
        visit_count: 1, is_vip: false
      })
    }).catch(() => {});

    await renderTickets({ ...order, status: 'paid' }, tickets);

  } catch(e) { console.error(e); showError(); }
}

async function renderTickets(order, ticketsData) {
  let tickets = ticketsData;
  if (!tickets) {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/tickets?order_id=eq.${order.id}&select=*&order=type.asc`,
      { headers: HDRS }
    );
    tickets = await res.json();
  }

  // אם אין tickets אבל order paid — צור אותם
  if (!tickets || tickets.length === 0) {
    await confirmPaymentAndCreateTickets({ ...order, status: 'pending' });
    return;
  }

  document.getElementById('successSub').innerHTML =
    `שלום ${order.name}! 🎸<br>לחץ/י על כל כרטיס לפתיחת הברקוד.`;

  const container = document.getElementById('ticketsList');

  const grouped = {};
  tickets.forEach(t => {
    if (!grouped[t.type]) grouped[t.type] = [];
    grouped[t.type].push(t);
  });

  // header
  const header = document.createElement('div');
  header.className = 'ticket-header';
  header.innerHTML = `
    <div>
      <div class="ticket-type-name">${order.ticket_type}</div>
      <div class="ticket-owner">${order.name}</div>
    </div>
    <div class="ticket-badge">RADIO E.P.G.B</div>
  `;
  container.appendChild(header);

  // coupons
  const couponsList = document.createElement('div');
  couponsList.className = 'coupons-list';

  const order_types = ['entry', 'chaser', 'drink', 'beer', 'gift'];

  for (const type of order_types) {
    if (!grouped[type]) continue;
    for (let i = 0; i < grouped[type].length; i++) {
      const ticket   = grouped[type][i];
      const info     = QR_LABELS[type] || { label: type, sub: '', color: 'entry', icon: '🎟' };
      const label    = grouped[type].length > 1 ? `${info.label} ${i+1}` : info.label;
      const scanUrl  = `https://epgb.ngazit16.workers.dev/scan.html?token=${ticket.qr_token}`;
      const redeemed = ticket.redeemed;

      const coupon = document.createElement('div');
      coupon.className = `coupon${redeemed ? ' redeemed' : ''}`;

      coupon.innerHTML = `
        <div class="coupon-closed" onclick="toggleCoupon(this.parentElement, '${scanUrl}')">
          <div class="coupon-icon-wrap ${info.color}">${info.icon}</div>
          <div class="coupon-text">
            <div class="coupon-title ${info.color}">${label}</div>
            <div class="coupon-sub">${redeemed ? '✓ נוצל' : info.sub + ' · לחץ לפתיחה'}</div>
          </div>
          <div class="coupon-right">
            <div class="redeemed-stamp">נוצל</div>
            <div class="coupon-arrow">›</div>
          </div>
        </div>
        <div class="coupon-open">
          <div class="qr-box" id="qr-${ticket.id}"></div>
          <div class="qr-hint">${redeemed ? '✓ כרטיס זה נוצל' : 'הצג לצוות לסריקה'}</div>
        </div>
      `;

      couponsList.appendChild(coupon);
    }
  }

  container.appendChild(couponsList);

  // footer
  const footer = document.createElement('div');
  footer.className = 'ticket-footer';
  footer.innerHTML = `
    <div class="ticket-footer-left">SHADAL 7 · TLV</div>
    <div class="ticket-footer-right">₪${order.amount}</div>
  `;
  container.appendChild(footer);

  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
}

function showError() {
  document.getElementById('loading').style.display  = 'none';
  document.getElementById('errorDiv').style.display = 'block';
}

loadTickets();
</script>
</body>
</html>

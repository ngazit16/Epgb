<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>שגיאה בתשלום · Radio E.P.G.B</title>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Bebas+Neue&family=Frank+Ruhl+Libre:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #f0ece4;
      font-family: 'Frank Ruhl Libre', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }
    .icon {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 80px;
      color: #cc1f1f;
      line-height: 1;
      margin-bottom: 24px;
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }
    p {
      font-size: 16px;
      color: #888;
      line-height: 2;
      max-width: 400px;
    }
    .logo {
      font-family: 'Special Elite', monospace;
      font-size: 13px;
      letter-spacing: 4px;
      color: #444;
      margin-top: 60px;
    }
    .logo span { color: #cc1f1f; }
    a {
      display: inline-block;
      margin-top: 40px;
      padding: 14px 36px;
      background: #cc1f1f;
      color: #fff;
      font-family: 'Special Elite', monospace;
      font-size: 12px;
      letter-spacing: 3px;
      text-decoration: none;
      transition: all 0.2s;
    }
    a:hover { background: #a01515; }
  </style>
</head>
<body>
  <div class="icon">✕</div>
  <h1>התשלום נכשל</h1>
  <p>
    משהו השתבש בתהליך התשלום.<br>
    נסה שוב — הכרטיסים עדיין ממתינים לך.
  </p>
  <a href="javascript:history.back()">← נסה שוב</a>
  <div class="logo">RADIO <span>E.P.G.B</span></div>
</body>
</html>
